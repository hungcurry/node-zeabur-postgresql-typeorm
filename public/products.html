<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zod 驗證與測試面板</title>
  </head>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f5f7fa;
      padding: 40px 20px;
      color: #333;
    }
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
    .result-wrapper {
      grid-column: 1 / -1;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      /* 修正點 1：確保容器在任何情況下都不會超出父層，並允許內部內容縮小 */
      min-width: 0;
    }
    h2 {
      margin-top: 0;
      color: #1a1a1a;
      border-bottom: 2px solid #eaeaea;
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      width: 100%;
      color: white;
      border: none;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-post {
      background-color: #4f46e5;
    }
    .btn-post:hover {
      background-color: #4338ca;
    }
    .btn-put {
      background-color: #0d9488;
    }
    .btn-put:hover {
      background-color: #0f766e;
    }
    .result-section {
      margin-top: 5px;
    }
    pre {
      background-color: #1e1e1e;
      color: #7ec699;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 14px;
      max-height: 300px;
      /* 修正點 2：強制讓 pre 寬度跟隨父層，配合 overflow-x 才會正確產生內部捲軸 */
      width: 100%;
      box-sizing: border-box;
      white-space: pre-wrap; /* 選擇性：若希望長行在手機板自動折行而非只有捲軸，可開啟此行 */
    }
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .success {
      background-color: #def7ec;
      color: #03543f;
    }
    .error {
      background-color: #fde8e8;
      color: #9b1c1c;
    }

    /* RWD 斷點設定 */
    @media (max-width: 768px) {
      body {
        padding: 20px 10px; /* 修正點 3：縮減手機板的 body 內邊距，留給內容更多空間 */
      }
      .grid-container {
        grid-template-columns: 1fr;
      }
      .result-wrapper {
        /* 修正點 4：在單欄模式下，重設 grid-column 避免瀏覽器計算寬度出錯 */
        grid-column: auto;
      }
    }
  </style>

  <body>
    <div class="grid-container">
      <div class="container">
        <h2>🚀 新增商品測試 (POST)</h2>
        <form id="productForm">
          <div class="form-group">
            <label for="title">商品名稱 (String)</label>
            <input type="text" id="title" value="極致黑人體工學椅" required />
          </div>

          <div class="form-group">
            <label for="price">商品價格 (Number)</label>
            <input type="number" id="price" value="5800" required />
          </div>

          <div class="form-group">
            <label for="stock">商品庫存 (Integer)</label>
            <input type="number" id="stock" value="15" required />
          </div>

          <button type="submit" class="btn-post">送出 POST 請求</button>
        </form>
      </div>

      <div class="container">
        <h2>🔄 更新商品測試 (PUT)</h2>
        <form id="updateProductForm">
          <div class="form-group">
            <label for="updateId">商品 ID (String/Number 為主鍵)</label>
            <input type="text" id="updateId" value="prod_01" required />
          </div>

          <div class="form-group">
            <label for="updateTitle">更新名稱 (String)</label>
            <input type="text" id="updateTitle" value="極致黑人體工學椅 V2" required />
          </div>

          <div class="form-group">
            <label for="updatePrice">更新價格 (Number)</label>
            <input type="number" id="updatePrice" value="6200" required />
          </div>

          <div class="form-group">
            <label for="updateStock">更新庫存 (Integer)</label>
            <input type="number" id="updateStock" value="20" required />
          </div>

          <button type="submit" class="btn-put">送出 PUT 請求</button>
        </form>
      </div>

      <div class="result-wrapper">
        <div class="result-section">
          <h3>回應結果：</h3>
          <div id="statusContainer"></div>
          <pre id="jsonResult">點擊上方按鈕送出請求後，結果會顯示在這裡...</pre>
        </div>
      </div>
    </div>
  </body>

  <script>
    const API_URL = 'http://localhost:8080'
    const jsonResult = document.getElementById('jsonResult')
    const statusContainer = document.getElementById('statusContainer')

    // 共用渲染回應與錯誤處理的函式
    async function handleFetchRequest(url, options) {
      jsonResult.textContent = '傳送中...'
      statusContainer.innerHTML = ''

      try {
        const response = await fetch(url, options)
        const resData = await response.json()

        if (response.ok) {
          statusContainer.innerHTML = `<span class="status-badge success">成功 HTTP ${response.status}</span>`
        } else {
          statusContainer.innerHTML = `<span class="status-badge error">失敗 HTTP ${response.status}</span>`
        }

        jsonResult.textContent = JSON.stringify(resData, null, 2)
      } catch (error) {
        statusContainer.innerHTML = `<span class="status-badge error">連線失敗 (Network Error)</span>`
        jsonResult.textContent = `無法連接到 ${url} \n請確認後端伺服器是否已啟動，或是 CORS 尚未開啟。\n\n詳細錯誤: ${error.message}`
      }
    }

    // ==========================================
    // 1. 監聽 新增商品 (POST)
    // ==========================================
    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault()

      const payload = {
        title: document.getElementById('title').value,
        price: Number(document.getElementById('price').value),
        stock: parseInt(document.getElementById('stock').value, 10),
      }

      await handleFetchRequest(`${API_URL}/products`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(payload),
      })
    })

    // ==========================================
    // 2. 監聽 更新商品 (PATCH)
    // ==========================================
    document.getElementById('updateProductForm').addEventListener('submit', async (e) => {
      e.preventDefault()

      const id = document.getElementById('updateId').value

      // 封裝 PATCH 的資料載荷
      const payload = {
        title: document.getElementById('updateTitle').value,
        price: Number(document.getElementById('updatePrice').value),
        stock: parseInt(document.getElementById('updateStock').value, 10),
      }

      // 備註：此處採用 RESTful 習慣將 id 帶在 URL 中 (`/products/:id`)。
      // 若你的後端設計是將 id 放在 body 中，請自行改為：body: JSON.stringify({ id, ...payload })
      await handleFetchRequest(`${API_URL}/products/${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(payload),
      })
    })
  </script>
</html>
