<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zod 驗證</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #f5f7fa;
        padding: 40px 20px;
        color: #333;
      }
      .container {
        max-width: 500px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }
      h2 {
        margin-top: 0;
        color: #1a1a1a;
        border-bottom: 2px solid #eaeaea;
        padding-bottom: 10px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 14px;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 16px;
      }
      button {
        width: 100%;
        background-color: #4f46e5;
        color: white;
        border: none;
        padding: 12px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background-color: #4338ca;
      }
      .result-section {
        margin-top: 25px;
      }
      pre {
        background-color: #1e1e1e;
        color: #7ec699;
        padding: 15px;
        border-radius: 4px;
        overflow-x: auto;
        font-size: 14px;
        max-height: 300px;
      }
      .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .success {
        background-color: #def7ec;
        color: #03543f;
      }
      .error {
        background-color: #fde8e8;
        color: #9b1c1c;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>🚀 新增商品測試 (POST)</h2>

      <form id="productForm">
        <div class="form-group">
          <label for="title">商品名稱 (String)</label>
          <input type="text" id="title" value="極致黑人體工學椅" required />
        </div>

        <div class="form-group">
          <label for="price">商品價格 (Number)</label>
          <input type="number" id="price" value="5800" required />
        </div>

        <div class="form-group">
          <label for="stock">商品庫存 (Integer)</label>
          <input type="number" id="stock" value="15" required />
        </div>

        <button type="submit">送出 POST 請求</button>
      </form>

      <div class="result-section">
        <h3>回應結果：</h3>
        <div id="statusContainer"></div>
        <pre id="jsonResult">點擊上方按鈕送出請求後，結果會顯示在這裡...</pre>
      </div>
    </div>
  </body>

  <script>
    const API_URL = 'http://localhost:8080'
    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault() // 阻止表單預設跳轉行為

      const jsonResult = document.getElementById('jsonResult')
      const statusContainer = document.getElementById('statusContainer')

      jsonResult.textContent = '傳送中...'
      statusContainer.innerHTML = ''

      // 1. 撈取表單資料，並轉換為後端想要的型別（注意：網頁 input 拿到的都是字串，要手動轉轉型，否則 Zod 會擋下來）
      const payload = {
        title: document.getElementById('title').value,
        price: Number(document.getElementById('price').value),
        stock: parseInt(document.getElementById('stock').value, 10),
      }

      try {
        // 2. 對你的本地後端發送 POST 請求
        const response = await fetch(`${API_URL}/products`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json', // 告訴後端我們是用 JSON 格式傳過去
          },
          body: JSON.stringify(payload),
        })

        // 3. 解析後端回應的 JSON 內容
        const resData = await response.json()

        // 4. 根據狀態碼渲染不同的 Badge
        if (response.ok) {
          statusContainer.innerHTML = `<span class="status-badge success">成功 HTTP ${response.status}</span>`
        } else {
          statusContainer.innerHTML = `<span class="status-badge error">失敗 HTTP ${response.status}</span>`
        }

        // 5. 將結果美化排版（排版縮排為 2 個空格）後丟到畫面上
        jsonResult.textContent = JSON.stringify(resData, null, 2)
      } catch (error) {
        // 如果完全連不上後端（可能沒開、或跨域問題）
        statusContainer.innerHTML = `<span class="status-badge error">連線失敗 (Network Error)</span>`
        jsonResult.textContent = `無法連接到 ${API_URL}/products \n請確認後端伺服器是否已啟動，或是 CORS 尚未開啟。\n\n詳細錯誤: ${error.message}`
      }
    })
  </script>
</html>
